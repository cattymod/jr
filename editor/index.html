<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatTube Jr Editor Selector</title>

<!-- Google Sans font -->
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
    body {
        font-family: 'Google Sans', sans-serif;
        background: linear-gradient(135deg, #1a1a1a, #121212);
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    h1 {
        font-size: 2em;
        text-align: center;
        margin-bottom: 50px;
        color: #f0f0f0;
    }

    .button-container {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        padding: 18px 40px;
        font-size: 18px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 15px;
        font-weight: 500;
        transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        color: white;
    }

    button .material-icons {
        font-size: 24px;
    }

    #simpleEditor {
        background: #ff4081;
    }

    #simpleEditor:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 10px 25px rgba(255,64,129,0.5);
    }

    #fullEditor {
        background: #2979ff;
    }

    #fullEditor:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 10px 25px rgba(41,121,255,0.5);
    }

    /* Responsive for smaller screens */
    @media (max-width: 600px) {
        .button-container {
            flex-direction: column;
        }
    }
</style>
</head>
<body>

<h1>Which version of CatTube Jr Editor do you want to code in?</h1>

<div class="button-container">
    <button id="simpleEditor" onclick="openEditor('simple')">
        <span class="material-icons">brush</span> Simple Editor (no stage)
    </button>
    <button id="fullEditor" onclick="openEditor('full')">
        <span class="material-icons">category</span> Full Editor
    </button>
</div>

<script>
    function openEditor(editorType) {
        if (editorType === 'simple') {
            window.open('https://cattymod.github.io/jr/editor/editorsimple.html', '_blank');
        } else if (editorType === 'full') {
            window.open('https://aurora-coding.lovable.app/', '_blank');
        }
    }
</script>

</body>
</html>
